<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#1874B8"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#1F8A4C"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#D33F49"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#D97706"/>
    </marker>
    <style>
      .hand { font-family: Virgil, Xiaolai, "Comic Sans MS", "Bradley Hand", "Noto Sans SC", sans-serif; }
      .title { font-size: 42px; font-weight: 700; fill: #0F7C80; }
      .subtitle { font-size: 21px; fill: #20242C; }
      .panel-title { font-size: 25px; font-weight: 700; fill: #20242C; }
      .node { font-size: 19px; fill: #20242C; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 15px; fill: #374151; }
      .label-blue { font-size: 15px; fill: #1874B8; }
      .label-green { font-size: 15px; fill: #1F8A4C; }
      .label-red { font-size: 15px; fill: #D33F49; }
      .label-orange { font-size: 15px; fill: #D97706; }
      .result { font-size: 17px; fill: #20242C; }
      .rule { font-size: 19px; fill: #0F7C80; font-weight: 700; }
      .panel { fill: #FFFFFF; stroke: #20242C; stroke-width: 3; rx: 24; ry: 24; }
      .host { fill: #FFF7E6; stroke: #D97706; stroke-width: 2.5; rx: 16; ry: 16; }
      .app { fill: #F2F2F2; stroke: #20242C; stroke-width: 2.5; rx: 16; ry: 16; }
      .cache-good { fill: #EAF8EC; stroke: #1F8A4C; stroke-width: 2.5; rx: 16; ry: 16; }
      .cache-blue { fill: #EEF6FF; stroke: #1874B8; stroke-width: 2.5; rx: 16; ry: 16; }
      .cache-bad { fill: #FFF0F0; stroke: #D33F49; stroke-width: 2.5; rx: 16; ry: 16; }
      .db { fill: #EAF8F7; stroke: #0F7C80; stroke-width: 2.5; rx: 16; ry: 16; }
      .arrow-blue { fill: none; stroke: #1874B8; stroke-width: 4; marker-end: url(#arrow-blue); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-green { fill: none; stroke: #1F8A4C; stroke-width: 4; marker-end: url(#arrow-green); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-red { fill: none; stroke: #D33F49; stroke-width: 3.5; marker-end: url(#arrow-red); stroke-dasharray: 10 9; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-orange { fill: none; stroke: #D97706; stroke-width: 3.5; marker-end: url(#arrow-orange); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>
  <text x="64" y="70" class="hand title">Cache + Database: Four Traffic Flow Examples</text>
  <text x="64" y="108" class="hand subtitle">The same request path behaves differently depending on cache state, freshness, and failover. Keep node positions stable; let arrows tell the story.</text>

  <g id="panel-1" transform="translate(64 132)">
    <rect class="panel" x="0" y="0" width="708" height="315"/>
    <text x="22" y="42" class="hand panel-title">1) Cache hit = fastest path</text>
    <rect class="host" x="44" y="116" width="132" height="62"/>
    <text x="110" y="139" class="hand node">Client</text>
    <text x="110" y="162" class="hand node">request</text>
    <rect class="app" x="248" y="108" width="150" height="78"/>
    <text x="323" y="135" class="hand node">API</text>
    <text x="323" y="160" class="hand node">service</text>
    <rect class="cache-good" x="486" y="82" width="152" height="78"/>
    <text x="562" y="108" class="hand node">Redis</text>
    <text x="562" y="133" class="hand node">fresh value</text>
    <rect class="db" x="486" y="202" width="152" height="62"/>
    <text x="562" y="233" class="hand node">Database</text>
    <path class="arrow-blue" d="M176 147 C205 147 218 147 248 147"/>
    <path class="arrow-green" d="M398 136 C430 119 452 118 486 119"/>
    <path class="arrow-green" d="M486 145 C452 171 431 178 398 166"/>
    <text x="420" y="96" class="hand label-green">hit</text>
    <text x="48" y="280" class="hand result">Result: API returns from cache. DB stays quiet; latency is low and stable.</text>
  </g>

  <g id="panel-2" transform="translate(828 132)">
    <rect class="panel" x="0" y="0" width="708" height="315"/>
    <text x="22" y="42" class="hand panel-title">2) Cache miss = DB read + fill cache</text>
    <rect class="host" x="44" y="116" width="132" height="62"/>
    <text x="110" y="139" class="hand node">Client</text>
    <text x="110" y="162" class="hand node">request</text>
    <rect class="app" x="248" y="108" width="150" height="78"/>
    <text x="323" y="135" class="hand node">API</text>
    <text x="323" y="160" class="hand node">service</text>
    <rect class="cache-bad" x="486" y="82" width="152" height="78"/>
    <text x="562" y="108" class="hand node">Redis</text>
    <text x="562" y="133" class="hand node">miss</text>
    <rect class="db" x="486" y="202" width="152" height="62"/>
    <text x="562" y="233" class="hand node">Database</text>
    <path class="arrow-blue" d="M176 147 C205 147 218 147 248 147"/>
    <path class="arrow-red" d="M398 136 C430 119 452 118 486 119"/>
    <path class="arrow-orange" d="M398 169 C430 210 452 224 486 229"/>
    <path class="arrow-green" d="M562 202 C562 180 562 174 562 160"/>
    <text x="425" y="96" class="hand label-red">miss</text>
    <text x="420" y="218" class="hand label-orange">read DB</text>
    <text x="574" y="184" class="hand label-green">fill</text>
    <text x="48" y="280" class="hand result">Result: first request pays DB cost; later requests reuse the filled cache.</text>
  </g>

  <g id="panel-3" transform="translate(64 490)">
    <rect class="panel" x="0" y="0" width="708" height="315"/>
    <text x="22" y="42" class="hand panel-title">3) Stale value = serve + refresh behind</text>
    <rect class="host" x="44" y="116" width="132" height="62"/>
    <text x="110" y="139" class="hand node">Client</text>
    <text x="110" y="162" class="hand node">request</text>
    <rect class="app" x="248" y="108" width="150" height="78"/>
    <text x="323" y="135" class="hand node">API</text>
    <text x="323" y="160" class="hand node">service</text>
    <rect class="cache-blue" x="486" y="82" width="152" height="78"/>
    <text x="562" y="108" class="hand node">Redis</text>
    <text x="562" y="133" class="hand node">stale value</text>
    <rect class="db" x="486" y="202" width="152" height="62"/>
    <text x="562" y="233" class="hand node">Database</text>
    <path class="arrow-blue" d="M176 147 C205 147 218 147 248 147"/>
    <path class="arrow-blue" d="M398 136 C430 119 452 118 486 119"/>
    <path class="arrow-orange" d="M398 176 C430 217 452 231 486 233"/>
    <path class="arrow-green" d="M562 202 C562 181 562 174 562 160"/>
    <text x="417" y="96" class="hand label-blue">serve stale</text>
    <text x="413" y="225" class="hand label-orange">refresh</text>
    <text x="48" y="280" class="hand result">Result: user gets a response now; refresh work updates the value for next time.</text>
  </g>

  <g id="panel-4" transform="translate(828 490)">
    <rect class="panel" x="0" y="0" width="708" height="315"/>
    <text x="22" y="42" class="hand panel-title">4) Cache down = bypass + protect DB</text>
    <rect class="host" x="44" y="116" width="132" height="62"/>
    <text x="110" y="139" class="hand node">Client</text>
    <text x="110" y="162" class="hand node">request</text>
    <rect class="app" x="248" y="108" width="150" height="78"/>
    <text x="323" y="135" class="hand node">API</text>
    <text x="323" y="160" class="hand node">service</text>
    <rect class="cache-bad" x="486" y="82" width="152" height="78"/>
    <text x="562" y="108" class="hand node">Redis</text>
    <text x="562" y="133" class="hand node">DOWN</text>
    <rect class="db" x="486" y="202" width="152" height="62"/>
    <text x="562" y="233" class="hand node">Database</text>
    <path class="arrow-blue" d="M176 147 C205 147 218 147 248 147"/>
    <path class="arrow-red" d="M398 136 C430 119 452 118 486 119"/>
    <path class="arrow-orange" d="M398 170 C432 213 453 229 486 232"/>
    <path class="arrow-red" d="M626 201 C646 181 646 161 626 142"/>
    <text x="423" y="96" class="hand label-red">timeout</text>
    <text x="410" y="222" class="hand label-orange">rate-limit DB</text>
    <text x="548" y="184" class="hand label-red">no fill</text>
    <text x="48" y="280" class="hand result">Result: bypass keeps service alive, but DB needs guardrails to avoid overload.</text>
  </g>

  <text x="64" y="858" class="hand rule">Rules of thumb: cache hits should be boring; misses should fill once; stale reads need refresh policy; outages need DB protection.</text>
</svg>
