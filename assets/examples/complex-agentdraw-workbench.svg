<text x="350" y="1031" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" text-anchor="start"><tspan x="350" dy="0">所有形状/文字/箭头均是 Excalidraw 元素</tspan></text>
