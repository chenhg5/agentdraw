<text x="112" y="719" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" text-anchor="start"><tspan x="112" dy="0">生成器原则：复杂关系优先分区表达，跨区依赖用总线或表格说明，避免长斜线穿越画布。</tspan></text>
