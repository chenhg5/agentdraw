<text x="126" y="458" fill="#EAF1FF" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500" text-anchor="start"><tspan x="126" dy="0">elements + appState + files + styleId；provider 可替换，但 agent 只面向稳定 JSON 合约。</tspan></text>
